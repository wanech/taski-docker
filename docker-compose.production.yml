# docker-compose.production.yml

volumes:
  pg_data_production:
  static_volume:

# Всё отличие — заменяем build на image и указываем, какой образ использовать
services:

  db:
    image: postgres:13.10
    env_file: .env
    restart: unless-stopped
    volumes:
      - pg_data_production:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: wanech/taski_backend # Качаем с Docker Hub
    env_file: .env
    restart: unless-stopped
    volumes:
      - static_volume:/backend_static
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: wanech/taski_frontend  # Качаем с Docker Hub
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static_volume:/frontend_static

  gateway:
    image: wanech/taski_gateway  # Качаем с Docker Hub
    env_file: .env
    restart: unless-stopped
    volumes:
      - static_volume:/staticfiles/
    ports:
      - 8000:80
    depends_on:
      - backend
      - frontend
